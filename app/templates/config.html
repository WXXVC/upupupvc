<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>初始化配置</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="app">
  <main class="panel">
    <h1>首次配置</h1>
    <p class="muted">请填写 Telegram 相关信息，保存后进入主界面。</p>

    <form id="config-form" class="form">
      <label>Telegram API ID
        <input name="api_id" value="{{ config.api_id or '' }}" required />
      </label>
      <label>Telegram API Hash
        <input name="api_hash" value="{{ config.api_hash or '' }}" required />
      </label>
      <label>手机号 (含国家码)
        <input name="phone_number" value="{{ config.phone_number or '' }}" required />
      </label>
      <label>目标频道 (如 @mychannel 或 -1001234567890)
        <input name="target_channel" value="{{ config.target_channel or '' }}" required />
      </label>
      <input type="hidden" name="download_path" value="{{ config.download_path or './downloads' }}" />
      <input type="hidden" name="max_download_concurrency" value="{{ config.max_download_concurrency }}" />
      <input type="hidden" name="split_threshold_mb" value="{{ config.split_threshold_mb }}" />
      <input type="hidden" name="download_postprocess" value="{{ config.download_postprocess }}" />
      <input type="hidden" name="upload_postprocess" value="{{ config.upload_postprocess }}" />
      <input type="hidden" name="upload_postprocess_path" value="{{ config.upload_postprocess_path or '' }}" />
      <input type="hidden" name="auto_upload" value="{{ 1 if config.auto_upload else 0 }}" />

      <button type="submit">保存并进入</button>
      <div id="status" class="status"></div>
    </form>
  </main>
  <script src="/static/js/config.js"></script>
</body>
</html>
