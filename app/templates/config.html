<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>初始化配置</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="app">
  <main class="panel">
    <h1>首次配置</h1>
    <p class="muted">请填写 Telegram 与下载路径配置，保存后进入主界面。</p>

    <form id="config-form" class="form">
      <label>Telegram API ID
        <input name="api_id" value="{{ config.api_id or '' }}" required />
      </label>
      <label>Telegram API Hash
        <input name="api_hash" value="{{ config.api_hash or '' }}" required />
      </label>
      <label>手机号 (含国家码)
        <input name="phone_number" value="{{ config.phone_number or '' }}" required />
      </label>
      <label>目标频道 (如 @mychannel 或 -1001234567890)
        <input name="target_channel" value="{{ config.target_channel or '' }}" required />
      </label>
      <label>下载路径
        <input name="download_path" value="{{ config.download_path or '' }}" required />
      </label>
      <div class="grid">
        <label>下载并发数 (1-10)
          <input name="max_download_concurrency" type="number" min="1" max="10" value="{{ config.max_download_concurrency }}" />
        </label>
        <label>分割阈值 (MB)
          <input name="split_threshold_mb" type="number" min="256" value="{{ config.split_threshold_mb }}" />
        </label>
      </div>
      <div class="grid">
        <label>TDLib 库路径 (tdjson)
          <input name="tdlib_lib_path" value="{{ config.tdlib_lib_path or '' }}" placeholder="例如 C:\\tdlib\\tdjson.dll" />
        </label>
        <label>TDLib 数据目录
          <input name="tdlib_database_dir" value="{{ config.tdlib_database_dir or '' }}" placeholder="例如 ./tdlib" />
        </label>
      </div>
      <div class="grid">
        <label>TDLib 文件目录
          <input name="tdlib_files_dir" value="{{ config.tdlib_files_dir or '' }}" placeholder="例如 ./tdlib/files" />
        </label>
        <label>TDLib 加密密钥 (可选)
          <input name="tdlib_encryption_key" value="{{ config.tdlib_encryption_key or '' }}" />
        </label>
      </div>
      <div class="grid">
        <label>下载后处理
          <select name="download_postprocess">
            <option value="keep" {% if config.download_postprocess == 'keep' %}selected{% endif %}>保留</option>
            <option value="move" {% if config.download_postprocess == 'move' %}selected{% endif %}>移动到目录</option>
            <option value="delete" {% if config.download_postprocess == 'delete' %}selected{% endif %}>删除</option>
          </select>
        </label>
        <label>上传后处理
          <select name="upload_postprocess">
            <option value="keep" {% if config.upload_postprocess == 'keep' %}selected{% endif %}>保留</option>
            <option value="move" {% if config.upload_postprocess == 'move' %}selected{% endif %}>移动到目录</option>
            <option value="delete" {% if config.upload_postprocess == 'delete' %}selected{% endif %}>删除</option>
          </select>
        </label>
      </div>
      <label>上传后处理目录模板 (可选)
        <input name="upload_postprocess_path" value="{{ config.upload_postprocess_path or '' }}" placeholder="例如 ./uploaded/{date}/{type}" />
      </label>
      <label>下载完成后自动上传
        <select name="auto_upload">
          <option value="1" {% if config.auto_upload %}selected{% endif %}>是</option>
          <option value="0" {% if not config.auto_upload %}selected{% endif %}>否</option>
        </select>
      </label>
      <button type="submit">保存并进入</button>
      <div id="status" class="status"></div>
    </form>
  </main>
  <script src="/static/js/config.js"></script>
</body>
</html>
